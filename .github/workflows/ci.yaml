---
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck and test
        run: |
          npm run typecheck
          npm test

      - name: Build
        run: npm run build

      - name: Check dist is up to date
        run: git diff --exit-code dist/

  integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install latest
        id: latest
        uses: ./

      - name: Run installed gobottle
        run: gobottle version

      - name: Install exact pin
        id: pinned
        uses: ./
        with:
          version: 0.2.0

      - name: Derive major of latest
        id: major
        run: echo "major=${LATEST%%.*}" >> "$GITHUB_OUTPUT"
        env:
          LATEST: ${{ steps.latest.outputs.version }}

      - name: Install prefix
        id: prefix
        uses: ./
        with:
          version: ${{ steps.major.outputs.major }}

      - name: Assert resolutions
        run: |
          test "${{ steps.pinned.outputs.version }}" = "0.2.0"
          # a major prefix resolves to the newest stable of that major -
          # for latest's own major that is latest itself, already cached
          # by the first step
          test "${{ steps.prefix.outputs.version }}" = "${{ steps.latest.outputs.version }}"
          test "${{ steps.prefix.outputs.cache-hit }}" = "true"
